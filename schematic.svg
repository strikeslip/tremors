<text x="141" y="224" font-size="11" fill="#0F6E56" text-anchor="middle">x56 TFP bearings</text>

<rect x="222" y="180" width="130" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="287" y="206" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">triaxial accel.</text>
<text x="287" y="224" font-size="11" fill="#0F6E56" text-anchor="middle">base + super + roof</text>

<rect x="368" y="180" width="130" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
