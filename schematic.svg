<rect x="60" y="508" width="420" height="134" rx="10" fill="none" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="6 3" opacity="0.7"/>
<text x="76" y="526" font-size="10" fill="#534AB7">SeisClaw / SOS musification engine</text>

<rect x="76" y="534" width="120" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="136" y="560" font-size="13" font-weight="600" fill="#26215C" text-anchor="middle">grain position</text>
<text x="136" y="578" font-size="11" fill="#534AB7" text-anchor="middle">← TFP displacement</text>

<rect x="216" y="534" width="120" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
