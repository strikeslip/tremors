<rect x="80" y="688" width="156" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="158" y="714" font-size="13" font-weight="600" fill="#4A1B0C" text-anchor="middle">Holosonics</text>
<text x="158" y="732" font-size="11" fill="#993C1D" text-anchor="middle">parametric speakers</text>

<rect x="252" y="688" width="156" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="330" y="714" font-size="13" font-weight="600" fill="#4A1B0C" text-anchor="middle">sound baths</text>
<text x="330" y="732" font-size="11" fill="#993C1D" text-anchor="middle">periodic gallery events</text>

<rect x="424" y="688" width="156" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
