<line x1="141" y1="240" x2="141" y2="342" stroke="#0F6E56" stroke-width="0.8" marker-end="url(#arrT)"/>
<line x1="287" y1="240" x2="287" y2="342" stroke="#0F6E56" stroke-width="0.8" marker-end="url(#arrT)"/>
<line x1="433" y1="240" x2="433" y2="342" stroke="#0F6E56" stroke-width="0.8" marker-end="url(#arrT)"/>
<line x1="574" y1="240" x2="574" y2="342" stroke="#0F6E56" stroke-width="0.8" marker-end="url(#arrT)"/>

