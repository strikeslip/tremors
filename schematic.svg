<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">

<!-- lane dividers -->
<line x1="50" y1="162" x2="640" y2="162" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="50" y1="326" x2="640" y2="326" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="50" y1="490" x2="640" y2="490" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="50" y1="654" x2="640" y2="654" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- LAYER LABELS -->
<text x="28" y="108" font-size="11" fill="#999" text-anchor="middle" transform="rotate(-90,28,108)">physical</text>
<text x="28" y="248" font-size="11" fill="#999" text-anchor="middle" transform="rotate(-90,28,248)">sensing</text>
<text x="28" y="412" font-size="11" fill="#999" text-anchor="middle" transform="rotate(-90,28,412)">platform</text>
<text x="28" y="572" font-size="11" fill="#999" text-anchor="middle" transform="rotate(-90,28,572)">musification</text>
<text x="28" y="728" font-size="11" fill="#999" text-anchor="middle" transform="rotate(-90,28,728)">output</text>

<!-- ═══ LAYER 1: PHYSICAL ═══ -->
<rect x="60" y="38" width="560" height="112" rx="10" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6 3"/>
<text x="76" y="56" font-size="10" fill="#999">David Geffen Galleries — 900ft monolithic slab</text>

<!-- 56 TFP -->
<rect x="76" y="64" width="110" height="72" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
<text x="131" y="96" font-size="13" font-weight="600" fill="#444" text-anchor="middle">56 TFP</text>
<text x="131" y="114" font-size="11" fill="#666" text-anchor="middle">isolators</text>

<!-- concrete -->
<rect x="202" y="64" width="110" height="72" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
<text x="257" y="96" font-size="13" font-weight="600" fill="#444" text-anchor="middle">concrete</text>
<text x="257" y="114" font-size="11" fill="#666" text-anchor="middle">slab / structure</text>

<!-- facade -->
<rect x="328" y="64" width="110" height="72" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
<text x="383" y="96" font-size="13" font-weight="600" fill="#444" text-anchor="middle">facade</text>
<text x="383" y="114" font-size="11" fill="#666" text-anchor="middle">viscous dampers</text>

<!-- ground -->
<rect x="454" y="64" width="110" height="72" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
<text x="509" y="96" font-size="13" font-weight="600" fill="#444" text-anchor="middle">ground</text>
<text x="509" y="114" font-size="11" fill="#666" text-anchor="middle">seismic input</text>

<!-- arrows phys -> sensing -->
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<line x1="131" y1="136" x2="131" y2="178" stroke="#999" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="257" y1="136" x2="257" y2="178" stroke="#999" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="383" y1="136" x2="383" y2="178" stroke="#999" stroke-width="0.8" marker-end="url(#arr)"/>
<line x1="509" y1="136" x2="509" y2="178" stroke="#999" stroke-width="0.8" marker-end="url(#arr)"/>

<!-- ═══ LAYER 2: SENSING ═══ -->
<rect x="76" y="180" width="130" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
