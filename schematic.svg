<text x="139" y="414" font-size="11" fill="#0F6E56" text-anchor="middle">accel → disp + vel</text>

<rect x="218" y="370" width="126" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="281" y="396" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">digital twin</text>
<text x="281" y="414" font-size="11" fill="#0F6E56" text-anchor="middle">vs structural model</text>

<rect x="360" y="370" width="126" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="423" y="396" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">BOSI scale</text>
<text x="423" y="414" font-size="11" fill="#0F6E56" text-anchor="middle">composite alert level</text>

<rect x="502" y="370" width="110" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
