<text x="557" y="414" font-size="11" fill="#0F6E56" text-anchor="middle">post-event export</text>

<!-- arrows platform -> musification -->
<line x1="139" y1="430" x2="139" y2="506" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arrP)"/>
<line x1="281" y1="430" x2="281" y2="506" stroke="#534AB7" stroke-width="0.8" marker-end="url(#arrP)"/>
