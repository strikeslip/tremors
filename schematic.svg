<text x="276" y="578" font-size="11" fill="#534AB7" text-anchor="middle">← acceleration G</text>

<rect x="356" y="534" width="120" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
