<text x="433" y="224" font-size="11" fill="#0F6E56" text-anchor="middle">embedded in slab</text>

<rect x="514" y="180" width="120" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
