<text x="562" y="578" font-size="11" fill="#854F0B" text-anchor="middle">← BOSI level</text>

<!-- collect lines to merge point -->
<line x1="136" y1="594" x2="136" y2="624" stroke="#534AB7" stroke-width="0.6"/>
<line x1="276" y1="594" x2="276" y2="624" stroke="#534AB7" stroke-width="0.6"/>
<line x1="416" y1="594" x2="416" y2="624" stroke="#534AB7" stroke-width="0.6"/>
<line x1="562" y1="594" x2="562" y2="624" stroke="#BA7517" stroke-width="0.6"/>
<line x1="136" y1="624" x2="326" y2="640" stroke="#534AB7" stroke-width="0.6"/>
<line x1="276" y1="624" x2="320" y2="640" stroke="#534AB7" stroke-width="0.6"/>
<line x1="416" y1="624" x2="334" y2="640" stroke="#534AB7" stroke-width="0.6"/>
<line x1="562" y1="624" x2="340" y2="640" stroke="#BA7517" stroke-width="0.6"/>

